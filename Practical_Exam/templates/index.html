<!DOCTYPE html>
<html>
<head>
    <title>User Registration</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8; 
            color: #333;
            padding: 40px;
        }

        /* Form styling */
        .form-box {
            background-color: #ffffff;
            max-width: 400px;
            margin: 0 auto; 
            padding: 30px;
            border-radius: 8px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        input[type="text"], input[type="email"], input[type="number"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 8px 0 20px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; 
        }

        /* Primary Submit Button styling */
        button {
            width: 100%;
            background-color: #0056b3;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover {
            background-color: #004494; 
        }

        /* Table styling */
        table {
            width: 100%;
            max-width: 800px;
            margin: 40px auto; 
            border-collapse: collapse;
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #0056b3; 
            color: white;
        }

        /* Red Delete Button styling */
        .delete-btn {
            color: white;
            background-color: #dc3545;
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
        }

        .delete-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

    <div class="form-box">
        <h2>Register New User</h2>
        <form method="POST" action="/">
            <label>Username:</label>
            <input type="text" name="username" required>

            <label>Email:</label>
            <input type="email" name="email" required>

            <label>Age:</label>
            <input type="number" name="age" required>

            <label>Password:</label>
            <input type="password" name="password" required>

            <button type="submit">Submit Data</button>
        </form>
    </div>

    <table>
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Age</th>
            <th>Password</th>
            <th>Action</th>
        </tr>
        
        {% for user in users %}
        <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.age }}</td>
            <td>{{ user.password }}</td>
            <td>
                <a href="/delete/{{ user.id }}" class="delete-btn">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>
